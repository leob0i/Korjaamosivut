  <line x1="0" y1="200" x2="800" y2="200" stroke="#e8c547" stroke-width="1" opacity="0.20"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#e8c547" stroke-width="1" opacity="0.20"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#e8c547" stroke-width="1" opacity="0.20"/>
  <line x1="100" y1="0" x2="100" y2="500" stroke="#e8c547" stroke-width="1" opacity="0.20"/>
